<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梦境视频生成器 - Dream2Video</title>
    <style>
        /* 保留你最喜欢的星空深色主题 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; min-height: 100vh; background: linear-gradient(180deg, #0f0f23 0%, #1a1a3e 50%, #2d2d5a 100%); color: #fff; overflow-x: hidden; }
        .stars { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
        .star { position: absolute; width: 2px; height: 2px; background: rgba(255,255,255,0.3); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
        nav { position: relative; z-index: 10; display: flex; justify-content: space-between; align-items: center; padding: 24px; }
        .logo { font-size: 24px; font-weight: bold; }
        .container { position: relative; z-index: 10; max-width: 768px; margin: 0 auto; padding: 32px 24px; text-align: center; }
        header { margin-bottom: 32px; }
        .badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(15,15,35,0.5); padding: 8px 16px; border-radius: 999px; font-size: 14px; color: #a5a5d4; margin-bottom: 16px; }
        h1 { font-size: 40px; margin-bottom: 12px; }
        .desc { color: #a5a5d4; font-size: 18px; max-width: 500px; margin: 0 auto; line-height: 1.5; }
        .input-card { background: rgba(15,15,35,0.5); backdrop-filter: blur(10px); border-radius: 20px; padding: 24px; border: 1px solid rgba(75,75,120,0.5); box-shadow: 0 20px 40px rgba(0,0,0,0.3); margin-top: 20px; }
        textarea { width: 100%; height: 160px; background: rgba(10,10,25,0.5); border: 1px solid rgba(75,75,120,0.5); border-radius: 12px; padding: 16px; color: #fff; font-size: 16px; resize: none; outline: none; margin-bottom: 20px; }
        
        /* 生成按钮 - 确保它是亮起的 */
        .btn-generate { 
            width: 100%; 
            padding: 16px; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            border: none; 
            background: linear-gradient(135deg, #7c7cd9 0%, #a5a5f0 100%); 
            color: #fff; 
            transition: transform 0.2s;
        }
        .btn-generate:active { transform: scale(0.98); }
        footer { margin-top: 50px; color: #4a4a7a; font-size: 14px; }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <nav>
        <div class="logo">🌙 Dream2Video</div>
    </nav>

    <div class="container">
        <header>
            <div class="badge">✨ AI 梦境视觉化</div>
            <h1>把梦境变成视频</h1>
            <p class="desc">醒来后，用文字或语音记录你的梦境，AI 帮你视觉化那些奇幻场景</p>
        </header>

        <div class="input-card">
            <textarea id="dreamInput" placeholder="描述你梦见的奇幻场景..."></textarea>
            <!-- 移除了 disabled，确保按钮永远可点 -->
            <button class="btn-generate" id="realBtn">🎬 生成梦境视频</button>
        </div>

        <p style="margin-top: 20px; color: #58a6ff; font-size: 14px;">
            💡 提示：点击后请在右下角对话框中查看生成进度
        </p>
    </div>

    <footer><p>🦐 Made with ✨ for dreamers</p></footer>

    <!-- 引入 Coze SDK -->
    <script src="https://lf-cdn.coze.com/obj/unpkg/flow-platform/chat-sdk/1.1.0-beta.0/index.js"></script>
    
    <script>
        // 1. 星空背景（保持原样）
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 40; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.top = Math.random() * 100 + '%';
            s.style.left = Math.random() * 100 + '%';
            starsContainer.appendChild(s);
        }

        // 2. 初始化 Coze（确保 ID 正确）
        const client = new CozeWebSDK.WebChatClient({
            config: {
                bot_id: '7621819035214413829', 
            },
            componentProps: {
                title: 'DreamLens AI 实验室',
            },
        });

        // 3. 【核心修复逻辑】
        // 我们改用一个新的 ID "realBtn" 来彻底避开旧代码的影响
        document.getElementById('realBtn').addEventListener('click', function() {
            console.log("按钮被点击了！");
            // 弹出 Coze 窗口
            client.show();
        });
    </script>
</body>
</html>
