<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamLens AI | 梦境视频生成器</title>
    <style>
        /* 这里的样式让你的页面看起来高级一点 */
        body { 
            margin: 0; 
            background: #0d1117; 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container { text-align: center; padding: 20px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; background: linear-gradient(45deg, #0070f3, #f81ce5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #8b949e; font-size: 1.1rem; }
        .hint { margin-top: 30px; font-size: 0.9rem; color: #58a6ff; border: 1px solid #30363d; padding: 10px 20px; border-radius: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>DreamLens AI</h1>
        <p>把你的梦境，变成好莱坞大片</p>
        <div class="hint">点击右下角图标，开始描述你的梦境</div>
    </div>

    <!-- 💡 在这里粘贴你在 Coze -> Chat SDK -> Installation 里的那段脚本 -->
    <!-- 就像下面这样（请替换成你自己的那段代码）： -->
    
    <script src="https://lf-cdn.coze.com/obj/unpkg/flow-platform/chat-sdk/1.1.0-beta.0/index.js"></script>
    <script>
        new CozeWebSDK.WebChatClient({
            config: {
                bot_id: '7621819035214413829', 
            },
            componentProps: {
                title: 'DreamLens AI',
            },
        });
    </script>

</body>
</html>
