<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梦境视频生成器 - Dream2Video</title>
    
    <!-- 1. 【关键修改】把脚本移到头部，确保它最先加载 -->
    <script src="https://lf-cdn.coze.com/obj/unpkg/flow-platform/chat-sdk/1.1.0-beta.0/index.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; min-height: 100vh; background: linear-gradient(180deg, #0f0f23 0%, #1a1a3e 50%, #2d2d5a 100%); color: #fff; overflow-x: hidden; }
        .stars { position: fixed; inset: 0; pointer-events: none; }
        .star { position: absolute; width: 2px; height: 2px; background: rgba(255,255,255,0.3); border-radius: 50%; }
        nav { position: relative; z-index: 10; padding: 24px; }
        .container { position: relative; z-index: 10; max-width: 768px; margin: 0 auto; padding: 32px 24px; text-align: center; }
        header { margin-bottom: 32px; }
        .badge { display: inline-flex; align-items: center; background: rgba(15,15,35,0.5); padding: 8px 16px; border-radius: 999px; font-size: 14px; color: #a5a5d4; }
        h1 { font-size: 40px; margin: 16px 0; }
        .desc { color: #a5a5d4; font-size: 18px; margin-bottom: 30px; }
        .input-card { background: rgba(15,15,35,0.5); backdrop-filter: blur(10px); border-radius: 20px; padding: 24px; border: 1px solid rgba(75,75,120,0.5); }
        textarea { width: 100%; height: 160px; background: rgba(10,10,25,0.5); border: 1px solid rgba(75,75,120,0.5); border-radius: 12px; padding: 16px; color: #fff; font-size: 16px; outline: none; margin-bottom: 20px; }
        
        /* 强制亮起的紫色按钮 */
        .btn-generate { 
            width: 100%; 
            padding: 16px; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            border: none; 
            background: linear-gradient(135deg, #7c7cd9 0%, #a5a5f0 100%) !important; 
            color: #fff !important; 
            display: block !important;
            opacity: 1 !important;
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <nav><div style="font-size:24px; font-weight:bold;">🌙 Dream2Video</div></nav>

    <div class="container">
        <header>
            <div class="badge">✨ AI 梦境视觉化</div>
            <h1>把梦境变成视频</h1>
            <p class="desc">醒来后，用文字或语音记录你的梦境，AI 帮你视觉化那些奇幻场景</p>
        </header>

        <div class="input-card">
            <textarea id="dreamInput" placeholder="描述你梦见的奇幻场景..."></textarea>
            <!-- 2. 【关键修改】使用 onclick 直接触发，绕过所有复杂的监听 -->
            <button class="btn-generate" id="realBtn" onclick="openCoze()">🎬 生成梦境视频</button>
        </div>
        <p style="margin-top:20px; color:#58a6ff; font-size:14px;">💡 提示：点击后请在右下角对话框中查看生成进度</p>
    </div>

    <script>
        // 1. 初始化星空
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 30; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.top = Math.random() * 100 + '%';
            s.style.left = Math.random() * 100 + '%';
            starsContainer.appendChild(s);
        }

        // 2. 初始化 Coze 客户端（放在全局）
        let cozeClient = null;
        try {
            cozeClient = new CozeWebSDK.WebChatClient({
                config: {
                    bot_id: '7621819035214413829', 
                },
                componentProps: {
                    title: 'DreamLens AI 实验室',
                },
            });
            console.log("Coze SDK 初始化成功");
        } catch (e) {
            console.error("Coze SDK 初始化失败:", e);
        }

        // 3. 【强力按钮函数】
        function openCoze() {
            console.log("按钮被点击了！尝试唤起 Coze...");
            if (cozeClient) {
                cozeClient.show();
            } else {
                alert("AI 助手还在赶来的路上，请等页面加载完再点哦～");
            }
        }
    </script>
</body>
</html>
