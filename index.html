<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梦境视频生成器 - Dream2Video</title>
    <style>
        /* 这里保留了你提供的所有星空和紫色主题样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; min-height: 100vh; background: linear-gradient(180deg, #0f0f23 0%, #1a1a3e 50%, #2d2d5a 100%); color: #fff; overflow-x: hidden; }
        .stars { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
        .star { position: absolute; width: 2px; height: 2px; background: rgba(255,255,255,0.3); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
        nav { position: relative; z-index: 10; display: flex; justify-content: space-between; align-items: center; padding: 24px; }
        .logo { display: flex; align-items: center; gap: 8px; font-size: 24px; font-weight: bold; }
        .container { position: relative; z-index: 10; max-width: 768px; margin: 0 auto; padding: 32px 24px; }
        header { text-align: center; margin-bottom: 32px; }
        .badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(15,15,35,0.5); padding: 8px 16px; border-radius: 999px; font-size: 14px; color: #a5a5d4; margin-bottom: 16px; }
        h1 { font-size: 40px; margin-bottom: 12px; }
        .desc { color: #a5a5d4; font-size: 18px; max-width: 500px; margin: 0 auto; line-height: 1.5; }
        .input-card { background: rgba(15,15,35,0.5); backdrop-filter: blur(10px); border-radius: 20px; padding: 24px; border: 1px solid rgba(75,75,120,0.5); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        textarea { width: 100%; height: 160px; background: rgba(10,10,25,0.5); border: 1px solid rgba(75,75,120,0.5); border-radius: 12px; padding: 16px; color: #fff; font-size: 16px; resize: none; outline: none; margin-top: 10px; }
        .btn-generate { width: 100%; margin-top: 16px; padding: 15px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; border: none; background: linear-gradient(135deg, #7c7cd9 0%, #a5a5f0 100%); color: #fff; transition: all 0.3s; }
        .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(124,124,217,0.4); }
        footer { text-align: center; padding: 40px; color: #4a4a7a; font-size: 14px; }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <nav>
        <div class="logo"><span class="logo-icon">🌙</span><span>Dream2Video</span></div>
    </nav>

    <div class="container">
        <header>
            <div class="badge"><span>✨</span><span>AI 梦境视觉化</span></div>
            <h1>把梦境变成视频</h1>
            <p class="desc">醒来后，用文字或语音记录你的梦境，AI 帮你视觉化那些奇幻场景</p>
        </header>

        <div class="input-card">
            <label style="color: #a5a5d4;">🌙 描述你的梦境</label>
            <textarea id="dreamInput" placeholder="描述你梦见的奇幻场景、颜色和情绪..."></textarea>
            
            <!-- 点击这个按钮将直接唤起 Coze 对话框 -->
            <button class="btn-generate" id="generateBtn">
                <span>🎬</span> 生成梦境视频
            </button>
        </div>

        <div class="tips" style="margin-top: 30px; text-align: center; color: #5a5a8a; font-size: 14px;">
            <p>💡 提示：点击生成后，请在弹出的对话框中确认发送</p>
        </div>
    </div>

    <footer><p>🦐 Made with ✨ for dreamers</p></footer>

    <!-- 1. 引入 Coze SDK -->
    <script src="https://lf-cdn.coze.com/obj/unpkg/flow-platform/chat-sdk/1.1.0-beta.0/index.js"></script>
    
    <script>
        // 星空背景动画逻辑
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 50; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.top = Math.random() * 100 + '%';
            s.style.left = Math.random() * 100 + '%';
            s.style.animationDelay = Math.random() * 3 + 's';
            starsContainer.appendChild(s);
        }

        // 2. 初始化 Coze 客户端
        const client = new CozeWebSDK.WebChatClient({
            config: {
                bot_id: '7621819035214413829', 
            },
            componentProps: {
                title: 'DreamLens AI 实验室',
            },
        });

        // 3. 核心交互：点击“生成”按钮触发 AI
        document.getElementById('generateBtn').addEventListener('click', function() {
            const content = document.getElementById('dreamInput').value.trim();
            
            if (!content) {
                alert("请先描述你的梦境哦 🌙");
                return;
            }

            // 弹出 Coze 对话框
            client.show();
            
            // 💡 小技巧：你可以提示用户手动粘贴，或者直接在弹出的窗口里交流
            // 由于 SDK 限制，目前最稳妥的方式是让用户点击后在弹窗里直接跟 AI 说
        });
    </script>
</body>
</html>
